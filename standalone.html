<html lang="zh-CN">
<head>

<title>AI能力与风格测评｜看见你的 AI 工作方式</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f2c94c'/><text x='50' y='68' font-size='42' font-weight='900' text-anchor='middle' fill='%23181814'>AI</text></svg>"/>
<style>
:root {
  --ink: #181814;
  --muted: #6f6b61;
  --paper: #f4f0e6;
  --card: #fffdf7;
  --line: #d9d2c2;
  --yellow: #f2c94c;
  --yellow-deep: #d7a900;
  --danger: #b5402f;
  --shadow: 0 18px 60px rgba(43, 38, 24, 0.11);
}

* { box-sizing: border-box; }
html { background: var(--paper); color: var(--ink); }
body { margin: 0; min-height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; background: var(--paper); color: var(--ink); }
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
button:disabled { cursor: not-allowed; opacity: .45; }

.eyebrow { margin: 0 0 12px; color: #847a60; font-size: 12px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
.muted { color: var(--muted); line-height: 1.75; }
.brand-mark { display: inline-grid; place-items: center; width: 38px; height: 38px; margin-right: 12px; border-radius: 11px; background: var(--yellow); color: var(--ink); font-size: 13px; font-weight: 900; letter-spacing: -.04em; }
.primary-button { min-height: 50px; padding: 0 24px; border: 1px solid var(--ink); border-radius: 12px; background: var(--ink); color: white; font-weight: 800; box-shadow: 4px 4px 0 var(--yellow); transition: transform .18s, box-shadow .18s; }
.primary-button:hover { transform: translate(-1px, -1px); box-shadow: 6px 6px 0 var(--yellow); }
.primary-button.small { min-height: 42px; padding: 0 18px; box-shadow: none; }
.text-button { padding: 8px 4px; border: 0; background: transparent; color: var(--ink); font-weight: 700; }
.error-text { margin: 0; color: var(--danger); font-size: 14px; }

.landing-page { min-height: 100vh; padding: 0 clamp(24px, 6vw, 96px); background: radial-gradient(circle at 72% 20%, rgba(242,201,76,.28), transparent 28%), linear-gradient(135deg, #f8f5ed, #eee8d8); }
.top-nav { height: 92px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(24,24,20,.18); }
.top-nav > div { display: flex; align-items: center; }
.hero-grid { min-height: calc(100vh - 156px); display: grid; grid-template-columns: 1.25fr .75fr; align-items: center; gap: clamp(48px, 8vw, 130px); padding: 70px 0; }
.hero-copy { max-width: 780px; }
.hero-copy h1 { margin: 0; font-size: clamp(58px, 8vw, 118px); line-height: .94; letter-spacing: -.075em; }
.hero-copy h1 em { color: transparent; font-style: normal; -webkit-text-stroke: 2px var(--ink); }
.hero-description { max-width: 680px; margin: 36px 0 30px; color: #4e4a40; font-size: clamp(17px, 2vw, 22px); line-height: 1.75; }
.feature-row { display: flex; flex-wrap: wrap; gap: 12px; }
.feature-row span, .feature-row button { padding: 10px 14px; border: 1px solid var(--ink); border-radius: 999px; background: rgba(255,255,255,.35); color: var(--ink); font-size: 13px; font-weight: 700; }
.feature-row button { background: var(--yellow); }
.join-card { position: relative; padding: clamp(28px, 4vw, 46px); border: 1px solid var(--ink); border-radius: 26px; background: rgba(255,253,247,.92); box-shadow: 14px 14px 0 var(--ink); }
.join-number { position: absolute; right: 26px; top: 20px; color: #ddd4be; font-size: 50px; font-weight: 900; letter-spacing: -.08em; }
.join-card h2 { margin: 0 0 28px; font-size: 34px; letter-spacing: -.04em; }
.join-card input { width: 100%; height: 62px; padding: 0 18px; border: 1.5px solid var(--ink); border-radius: 12px; background: white; font-size: 22px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
.join-card .primary-button { width: 100%; margin-top: 18px; }
.privacy-note { margin: 18px 0 0; color: var(--muted); font-size: 12px; text-align: center; }
.landing-footer { min-height: 64px; display: flex; justify-content: space-between; border-top: 1px solid rgba(24,24,20,.18); color: var(--muted); font-size: 12px; align-items: center; }

.center-page { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 22% 10%, rgba(242,201,76,.28), transparent 30%), var(--paper); }
.form-card, .generating-card { width: min(100%, 560px); padding: clamp(28px, 5vw, 54px); border: 1px solid var(--ink); border-radius: 24px; background: var(--card); box-shadow: var(--shadow); }
.form-card h1, .generating-card h1 { margin: 0 0 14px; font-size: clamp(34px, 6vw, 52px); line-height: 1.08; letter-spacing: -.05em; }
.stack-form { display: grid; gap: 18px; margin-top: 30px; }
.stack-form label { display: grid; gap: 8px; font-size: 14px; font-weight: 800; }
.stack-form input, .stack-form select { width: 100%; height: 52px; padding: 0 14px; border: 1px solid var(--line); border-radius: 10px; background: white; outline: none; }
.stack-form input:focus, .stack-form select:focus { border-color: var(--yellow-deep); box-shadow: 0 0 0 3px rgba(242,201,76,.22); }
.back-link { margin: -15px 0 25px; }
.pulse-mark { display: grid; place-items: center; width: 76px; height: 76px; margin-bottom: 32px; border-radius: 22px; background: var(--yellow); font-size: 25px; font-weight: 900; animation: pulse 1.7s ease-in-out infinite; }
.generating-card p { color: var(--muted); line-height: 1.7; }
.loading-line { height: 8px; margin-top: 28px; overflow: hidden; border-radius: 8px; background: #e8e1d2; }
.loading-line span { display: block; width: 38%; height: 100%; border-radius: inherit; background: var(--yellow-deep); animation: slide 1.3s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.06) rotate(-2deg); } }
@keyframes slide { from { transform: translateX(-120%); } to { transform: translateX(350%); } }

.assessment-page { min-height: 100vh; background: var(--paper); }
.assessment-header { height: 76px; padding: 0 clamp(20px, 5vw, 72px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); background: var(--card); font-weight: 800; }
.assessment-header > div { display: flex; align-items: center; }
.progress-track { height: 6px; background: #ded7c7; }
.progress-track span { display: block; height: 100%; background: var(--yellow-deep); transition: width .35s ease; }
.question-card { width: min(100% - 36px, 820px); margin: 0 auto; padding: clamp(48px, 8vh, 92px) 0 70px; }
.question-card h1 { margin: 0 0 38px; font-size: clamp(28px, 5vw, 46px); line-height: 1.28; letter-spacing: -.045em; }
.option-list { display: grid; gap: 14px; }
.option-button { display: grid; grid-template-columns: 38px 1fr; align-items: center; gap: 16px; width: 100%; padding: 17px 18px; border: 1px solid var(--line); border-radius: 14px; background: var(--card); color: var(--ink); text-align: left; line-height: 1.55; transition: border-color .18s, transform .18s, background .18s; }
.option-button > span { display: grid; place-items: center; width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 9px; font-weight: 900; }
.option-button:hover { transform: translateY(-1px); border-color: #9b916f; }
.option-button.selected { border-color: var(--ink); background: #fff3bd; box-shadow: 4px 4px 0 var(--ink); }
.option-button.selected > span { border-color: var(--ink); background: var(--ink); color: white; }
.question-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 34px; }
.open-card textarea { width: 100%; min-height: 260px; padding: 18px; border: 1px solid var(--line); border-radius: 14px; background: white; resize: vertical; line-height: 1.8; outline: none; }
.open-card textarea:focus { border-color: var(--yellow-deep); box-shadow: 0 0 0 4px rgba(242,201,76,.2); }
.scenario-box { margin: -12px 0 22px; padding: 18px; border-left: 4px solid var(--yellow-deep); background: #fff9df; color: #4c473b; line-height: 1.8; }
.textarea-meta { display: flex; justify-content: space-between; margin-top: 8px; color: var(--muted); font-size: 12px; }

.report-page { min-height: 100vh; padding: 32px 18px 80px; background: #ddd6c5; }
.report-toolbar { width: min(100%, 1080px); margin: 0 auto 18px; display: flex; align-items: center; justify-content: space-between; }
.report-toolbar > div { display: flex; align-items: center; }
.report-toolbar-actions { gap: 14px; }
.report-sheet { width: min(100%, 1080px); margin: auto; overflow: hidden; border-radius: 22px; background: var(--paper); box-shadow: 0 24px 80px rgba(24,24,20,.18); }
.report-hero { display: grid; grid-template-columns: 1fr auto; gap: 30px; padding: 58px 64px; background: var(--ink); color: white; }
.report-hero h1 { max-width: 720px; margin: 0 0 12px; font-size: clamp(36px, 5vw, 62px); line-height: 1.05; letter-spacing: -.055em; }
.report-hero p:not(.eyebrow) { color: #c9c2b2; }
.score-ring { display: grid; place-items: center; align-content: center; width: 150px; height: 150px; border: 10px solid var(--yellow); border-radius: 50%; }
.score-ring strong { font-size: 48px; line-height: 1; }.score-ring span { margin-top: 8px; color: #ccc4b4; font-size: 12px; }
.report-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); }
.report-summary-grid article { min-height: 290px; padding: 42px 52px; background: var(--card); }
.panel-label { margin: 0 0 14px; color: #8a8067; font-size: 12px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
.level-code, .style-code { display: inline-block; margin: 8px 0; color: var(--yellow-deep); font-size: 58px; font-weight: 900; letter-spacing: -.07em; }
.report-summary-grid h2, .report-section h2 { margin: 0 0 14px; font-size: 30px; letter-spacing: -.035em; }
.report-summary-grid p { color: var(--muted); line-height: 1.7; }
.style-axes { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }.style-axes span { padding: 6px 9px; border: 1px solid var(--line); border-radius: 999px; font-size: 11px; }
.report-section { padding: 52px 64px; border-top: 1px solid var(--line); background: var(--card); }
.score-notes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; background: #fff8d6; }.score-notes article { display: grid; grid-template-columns: auto 1fr; gap: 16px; padding: 18px; border: 1px solid #d7bd51; border-radius: 13px; background: rgba(255,255,255,.55); }.score-notes article > span { color: var(--yellow-deep); font-size: 32px; font-weight: 900; }.score-notes strong { display: block; margin-bottom: 6px; }.score-notes p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
.style-analysis-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 28px; }.style-analysis-grid article { position: relative; min-height: 185px; padding: 22px; border: 1px solid var(--line); border-radius: 14px; background: #faf7ef; }.style-analysis-grid article:last-child { grid-column: 1 / -1; min-height: auto; background: var(--ink); color: white; }.style-analysis-grid article > span { color: var(--yellow-deep); font-size: 12px; font-weight: 900; }.style-analysis-grid h3 { margin: 10px 0; font-size: 18px; }.style-analysis-grid p, .style-analysis-grid ul, .style-analysis-grid ol { margin: 0; color: var(--muted); line-height: 1.8; }.style-analysis-grid article:last-child p, .style-analysis-grid article:last-child small { color: #d3cdbf; }.style-analysis-grid small { display: block; margin-top: 10px; line-height: 1.6; }
.radar-section { display: grid; grid-template-columns: .8fr 1.2fr; align-items: center; gap: 20px; }.radar-wrap { height: 340px; display: grid; place-items: center; }.capability-radar { width: min(100%, 340px); height: 100%; overflow: visible; }.dimension-grid { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }.dimension-grid div { padding: 14px; border: 1px solid var(--line); border-radius: 10px; }.dimension-grid span { display: block; color: var(--muted); font-size: 12px; }.dimension-grid strong { font-size: 26px; }
.rubric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 26px; }.rubric-grid article { padding: 18px; border: 1px solid var(--line); border-radius: 12px; }.rubric-grid article > div { display: flex; justify-content: space-between; }.rubric-grid article span { color: var(--yellow-deep); font-weight: 900; }.rubric-grid article p { margin: 12px 0 0; color: var(--muted); line-height: 1.55; }
.pending-panel { margin-top: 24px; padding: 18px; border: 1px dashed var(--line); color: var(--muted); }
.two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }.two-column ul { margin: 0; padding-left: 22px; line-height: 2; }
.upgraded-prompt pre { margin: 24px 0 0; padding: 24px; border-radius: 14px; background: #22221d; color: #f7f2e7; font-family: inherit; white-space: pre-wrap; line-height: 1.8; }
.action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }.action-grid article { padding: 20px; border: 1px solid var(--line); border-radius: 12px; }.action-grid span { color: var(--yellow-deep); font-size: 24px; font-weight: 900; }.action-grid p { line-height: 1.65; }
.report-footer { display: flex; justify-content: space-between; padding: 22px 64px; background: var(--yellow); font-size: 12px; font-weight: 800; }

.admin-page { min-height: 100vh; display: grid; grid-template-columns: 270px 1fr; background: #ebe6da; }
.admin-sidebar { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; padding: 24px 18px; background: var(--ink); color: white; }
.admin-brand { display: flex; align-items: center; padding: 4px 4px 22px; border-bottom: 1px solid #3a3932; }.admin-brand div { display: grid; }.admin-brand small { margin-top: 4px; color: #999486; }
.new-session-button { margin: 24px 0; padding: 13px; border: 1px solid var(--yellow); border-radius: 9px; background: var(--yellow); color: var(--ink); font-weight: 900; }
.side-label { color: #868174; font-size: 11px; font-weight: 900; letter-spacing: .12em; }.session-list { display: grid; gap: 7px; overflow: auto; }.session-list button { display: grid; gap: 5px; padding: 12px; border: 0; border-radius: 9px; background: transparent; color: #d8d3c7; text-align: left; }.session-list button.active { background: #34332d; color: white; }.session-list small { color: #868174; }.sidebar-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }.sidebar-footer button { padding: 10px 4px; border: 1px solid #44433b; border-radius: 8px; background: transparent; color: #aaa699; }
.atlas-sidebar-button { margin-top: auto; margin-bottom: 10px; padding: 11px; border: 1px solid #5a574e; border-radius: 8px; background: #34332d; color: var(--yellow); font-weight: 800; }.atlas-sidebar-button + .sidebar-footer { margin-top: 0; }
.admin-content { min-width: 0; padding: 38px clamp(24px, 4vw, 60px) 70px; }.admin-section.narrow { max-width: 620px; }.admin-section h1 { font-size: 44px; }

.atlas-backdrop { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 24px; background: rgba(14,14,12,.76); backdrop-filter: blur(8px); }
.atlas-panel { width: min(1180px, 100%); max-height: calc(100vh - 48px); overflow: auto; border: 1px solid #4c4a42; border-radius: 24px; background: #171713; color: white; box-shadow: 0 30px 100px rgba(0,0,0,.45); }
.atlas-header { display: flex; justify-content: space-between; gap: 30px; padding: 38px 42px 22px; }.atlas-header h2 { margin: 0; font-size: clamp(30px, 5vw, 52px); letter-spacing: -.05em; }.atlas-header p:not(.eyebrow) { max-width: 760px; margin: 12px 0 0; color: #aaa598; line-height: 1.7; }.atlas-close { flex: 0 0 auto; width: 44px; height: 44px; border: 1px solid #5a574e; border-radius: 50%; background: transparent; color: white; font-size: 28px; }
.atlas-axis-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 42px 28px; }.atlas-axis-legend span { padding: 8px 12px; border: 1px solid #514e45; border-radius: 999px; color: #d9d3c6; font-size: 12px; }
.atlas-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: #424039; border-top: 1px solid #424039; border-bottom: 1px solid #424039; }.atlas-card { position: relative; padding: 28px 34px; background: #21211c; }.atlas-card.active { background: #302d1f; box-shadow: inset 5px 0 0 var(--yellow); }.atlas-card-title { display: grid; grid-template-columns: 72px 1fr; gap: 18px; }.atlas-card-title > span { color: var(--yellow); font-size: 30px; font-weight: 900; letter-spacing: -.05em; }.atlas-card h3 { margin: 0; font-size: 22px; }.atlas-card-title p { margin: 5px 0 0; color: #aaa598; line-height: 1.5; }.atlas-card dl { display: grid; gap: 9px; margin: 20px 0 0; }.atlas-card dl > div { display: grid; grid-template-columns: 44px 1fr; gap: 10px; }.atlas-card dt { color: #777267; font-size: 12px; }.atlas-card dd { margin: 0; color: #d5d0c5; font-size: 13px; line-height: 1.55; }.atlas-current { position: absolute; right: 22px; top: 20px; padding: 5px 8px; border-radius: 999px; background: var(--yellow); color: var(--ink); font-size: 10px; }
.atlas-footer { padding: 20px 42px; color: #8f8a7f; font-size: 12px; text-align: center; }
.admin-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 30px; }.admin-header h1 { margin: 0 0 8px; font-size: 42px; letter-spacing: -.05em; }.admin-header p:not(.eyebrow) { color: var(--muted); }.admin-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }.admin-actions button { padding: 10px 13px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); }.admin-actions .danger { color: var(--danger); }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 30px 0 18px; }.stat-grid article, .chart-card, .qr-card, .submission-card { border: 1px solid var(--line); border-radius: 14px; background: var(--card); }.stat-grid article { padding: 20px; }.stat-grid span { color: var(--muted); font-size: 12px; }.stat-grid strong { display: block; margin: 8px 0; font-size: 31px; }.stat-grid small { color: #9d9688; }
.dashboard-grid { display: grid; grid-template-columns: 1.35fr .65fr; gap: 18px; }.chart-card, .qr-card { padding: 26px; }.chart-card h2, .qr-card h2, .submission-card h2 { margin: 0; font-size: 24px; }.bar-chart { display: grid; gap: 16px; margin-top: 26px; }.bar-chart > div { display: grid; grid-template-columns: 86px 1fr 32px; gap: 12px; align-items: center; font-size: 12px; }.bar-chart > div > div { height: 9px; overflow: hidden; border-radius: 10px; background: #e9e4d8; }.bar-chart i { display: block; height: 100%; border-radius: inherit; background: var(--yellow-deep); }.qr-card { text-align: center; }.qr-image { width: min(100%, 230px); margin: 18px auto 8px; display: block; }.qr-card > strong { font-size: 28px; letter-spacing: .16em; }.qr-card > p:last-child { color: var(--muted); font-size: 11px; }
.distribution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 18px; }.distribution-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 20px; }.distribution-list.compact { grid-template-columns: repeat(4, 1fr); }.distribution-list div { display: flex; justify-content: space-between; padding: 11px; border: 1px solid var(--line); border-radius: 8px; font-size: 12px; }
.submission-card { margin-top: 18px; padding: 26px; }.card-heading { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }.filters { display: flex; gap: 8px; }.filters select { height: 38px; padding: 0 10px; border: 1px solid var(--line); border-radius: 8px; background: white; }.table-wrap { margin-top: 20px; overflow-x: auto; }.table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }.table-wrap th, .table-wrap td { padding: 14px 12px; border-top: 1px solid var(--line); text-align: left; white-space: nowrap; }.table-wrap th { color: var(--muted); font-size: 11px; }.table-wrap a { color: var(--ink); font-weight: 800; }.status { padding: 5px 8px; border-radius: 999px; background: #eee9dd; font-size: 11px; }.status.complete { background: #d9ebd1; }.status.failed { background: #f3d8d0; }.empty-admin { display: grid; place-items: center; min-height: 65vh; color: var(--muted); text-align: center; }.admin-message { position: fixed; right: 24px; bottom: 24px; padding: 12px 16px; border-radius: 8px; background: var(--ink); color: white; }

@media (max-width: 900px) {
  .hero-grid { grid-template-columns: 1fr; padding-top: 50px; }.hero-copy h1 { font-size: clamp(54px, 15vw, 88px); }.join-card { max-width: 560px; }.landing-footer { gap: 20px; }
  .report-hero { padding: 42px 30px; }.report-summary-grid, .radar-section, .score-notes { grid-template-columns: 1fr; }.report-summary-grid article, .report-section { padding: 36px 30px; }.radar-wrap { height: 300px; }.dimension-grid { grid-template-columns: repeat(3, 1fr); }.action-grid { grid-template-columns: 1fr; }
  .admin-page { grid-template-columns: 1fr; }.admin-sidebar { position: static; height: auto; }.session-list { max-height: 190px; }.admin-content { padding: 28px 18px 60px; }.admin-header { display: grid; }.admin-actions { justify-content: flex-start; }.stat-grid { grid-template-columns: repeat(2, 1fr); }.dashboard-grid, .distribution-grid { grid-template-columns: 1fr; }
}

@media (max-width: 560px) {
